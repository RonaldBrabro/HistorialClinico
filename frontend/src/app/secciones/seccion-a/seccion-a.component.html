<section class="seccion-colapsable" [formGroup]="grupo">
  <div class="seccion-titulo">
    <h3>A. Datos personales</h3>
  </div>

  <div class="grid-formulario">
    <div class="campo">
      <label>Nombres y Apellidos</label>
      <input type="text" formControlName="nombresApellidos" />
    </div>
    <div class="campo">
      <label>Lugar de nacimiento</label>
      <input type="text" formControlName="lugarNacimiento" />
    </div>
    <div class="campo">
      <label>Provincia</label>
      <select formControlName="provinciaNacimiento">
        <option value="">Seleccione</option>
        <option *ngFor="let provincia of provincias" [value]="provincia">{{ provincia }}</option>
      </select>
    </div>
    <div class="campo" *ngIf="grupo?.get('provinciaNacimiento')?.value === 'Otro'">
      <label>Otra provincia</label>
      <input type="text" formControlName="otraProvinciaNacimiento" />
    </div>
    <div class="campo">
      <label>Fecha de nacimiento</label>
      <input type="date" formControlName="fechaNacimiento" />
    </div>
    <div class="campo">
      <label>Edad (anios)</label>
      <input type="text" formControlName="edadAnios" />
    </div>
    <div class="campo">
      <label>Edad (meses)</label>
      <input type="text" formControlName="edadMeses" />
    </div>
    <div class="campo">
      <label>Numero de cedula</label>
      <input type="text" formControlName="numeroCedula" />
    </div>
    <div class="campo">
      <label>Estado civil</label>
      <select formControlName="estadoCivil">
        <option value="">Seleccione</option>
        <option *ngFor="let estado of estadosCiviles" [value]="estado">{{ estado }}</option>
      </select>
    </div>
  </div>

  <div class="seccion-colapsable">
    <div class="seccion-titulo">
      <h4>Situacion laboral (maximo 2)</h4>
    </div>
    <div class="lista-check">
      <label *ngFor="let opcion of situacionesLaborales">
        <input
          type="checkbox"
          [checked]="utilidades.opcionSeleccionada(obtenerArray('situacionLaboral'), opcion)"
          [disabled]="!utilidades.opcionSeleccionada(obtenerArray('situacionLaboral'), opcion) && obtenerArray('situacionLaboral').length >= 2"
          (change)="utilidades.alternarOpcion(obtenerArray('situacionLaboral'), opcion, 2)"
        />
        {{ opcion }}
      </label>
    </div>
    <div class="campo">
      <label>Otro (especificar)</label>
      <input type="text" formControlName="situacionLaboralOtro" />
    </div>
  </div>

  <div class="campo">
    <label>Etiologia de la discapacidad</label>
    <select formControlName="etiologiaDiscapacidad">
      <option value="">Seleccione</option>
      <option *ngFor="let opcion of etiologiasDiscapacidad" [value]="opcion">{{ opcion }}</option>
    </select>
  </div>

  <div class="seccion-colapsable" formGroupName="discapacidadFisica">
    <div class="seccion-titulo">
      <h4>Discapacidad fisica</h4>
    </div>
    <div class="grid-formulario">
      <div class="campo">
        <label>Tiene carnet</label>
        <select formControlName="tieneCarnet">
          <option value="">Seleccione</option>
          <option value="Si">Si</option>
          <option value="No">No</option>
        </select>
      </div>
      <div class="campo">
        <label>% carnet</label>
        <input type="text" formControlName="porcentajeCarnet" />
      </div>
      <div class="campo">
        <label>Grado</label>
        <select formControlName="grado">
          <option value="">Seleccione</option>
          <option>Leve</option>
          <option>Moderado</option>
          <option>Grave</option>
          <option>Muy grave</option>
        </select>
      </div>
    </div>
    <div class="lista-check">
      <label *ngFor="let opcion of etiologiaDiscapacidadFisica">
        <input
          type="checkbox"
          [checked]="utilidades.opcionSeleccionada(utilidades.comoFormArray(grupo?.get('discapacidadFisica.etiologia')), opcion)"
          (change)="utilidades.alternarOpcion(utilidades.comoFormArray(grupo?.get('discapacidadFisica.etiologia')), opcion)"
        />
        {{ opcion }}
      </label>
    </div>
    <div class="campo">
      <label>Otro (especificar)</label>
      <input type="text" formControlName="etiologiaOtro" />
    </div>
  </div>
