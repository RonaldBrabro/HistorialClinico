<section class="seccion-colapsable" [formGroup]="grupo">
  <div class="seccion-titulo">
    <h3>F. Antecedentes medicos del paciente</h3>
  </div>

  <div class="grid-formulario">
    <div class="campo">
      <label>Enfermedades con tratamiento</label>
      <select formControlName="enfermedadesTratamiento">
        <option value="">Seleccione</option>
        <option>Si</option>
        <option>No</option>
      </select>
    </div>
    <div class="campo">
      <label>Alergias</label>
      <select formControlName="alergias">
        <option value="">Seleccione</option>
        <option>Si</option>
        <option>No</option>
      </select>
    </div>
    <div class="campo">
      <label>Intervenciones quirurgicas</label>
      <select formControlName="intervencionesQuirurgicas">
        <option value="">Seleccione</option>
        <option>Si</option>
        <option>No</option>
      </select>
    </div>
    <div class="campo">
      <label>Medicamentos requeridos/en consumo</label>
      <select formControlName="medicamentosConsumo">
        <option value="">Seleccione</option>
        <option>Si</option>
        <option>No</option>
      </select>
    </div>
  </div>
</section>
