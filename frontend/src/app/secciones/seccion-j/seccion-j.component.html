<section class="seccion-colapsable" [formGroup]="grupo">
  <div class="seccion-titulo">
    <h3>J. Consumo de sustancias</h3>
  </div>
  <div class="grid-formulario">
    <div class="campo">
      <label>Consume sustancia psicoactiva</label>
      <select formControlName="consumeSustancia">
        <option value="">Seleccione</option>
        <option>Si</option>
        <option>No</option>
      </select>
    </div>
    <div class="campo">
      <label>Frecuencia</label>
      <select formControlName="frecuencia">
        <option value="">Seleccione</option>
        <option *ngFor="let opcion of frecuencias" [value]="opcion">{{ opcion }}</option>
      </select>
    </div>
  </div>
  <div class="lista-check">
    <label *ngFor="let opcion of sustancias">
      <input
        type="checkbox"
        [checked]="utilidades.opcionSeleccionada(obtenerArray(), opcion)"
        (change)="utilidades.alternarOpcion(obtenerArray(), opcion)"
      />
      {{ opcion }}
    </label>
  </div>
  <div class="campo">
    <label>Otros</label>
    <input type="text" formControlName="otros" />
  </div>
</section>
