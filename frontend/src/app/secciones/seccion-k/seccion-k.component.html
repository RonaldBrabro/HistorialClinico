<section class="seccion-colapsable" [formGroup]="grupo">
  <div class="seccion-titulo">
    <h3>K. Habitos de sueno</h3>
  </div>
  <div class="lista-check">
    <label *ngFor="let opcion of opciones">
      <input
        type="checkbox"
        [checked]="utilidades.opcionSeleccionada(obtenerArray(), opcion)"
        (change)="utilidades.alternarOpcion(obtenerArray(), opcion)"
      />
      {{ opcion }}
    </label>
  </div>
</section>
